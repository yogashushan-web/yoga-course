name: Deploy to Netlify

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - all
          - landing
          - checkout
          - course
          - thankyou
          - asanaguides

jobs:
  deploy-landing:
    if: ${{ inputs.target == 'all' || inputs.target == 'landing' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g netlify-cli
      - run: netlify deploy --prod --dir=./landing --site=${{ secrets.NETLIFY_LANDING_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-checkout:
    if: ${{ inputs.target == 'all' || inputs.target == 'checkout' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g netlify-cli
      - run: cd checkout && npm install --production 2>/dev/null; cd ..
      - run: netlify deploy --prod --dir=./checkout --functions=./checkout/netlify/functions --site=${{ secrets.NETLIFY_CHECKOUT_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-course:
    if: ${{ inputs.target == 'all' || inputs.target == 'course' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g netlify-cli
      - run: cd course && npm install --production 2>/dev/null; cd ..
      - run: netlify deploy --prod --dir=./course --functions=./course/netlify/functions --site=${{ secrets.NETLIFY_COURSE_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-thankyou:
    if: ${{ inputs.target == 'all' || inputs.target == 'thankyou' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g netlify-cli
      - run: netlify deploy --prod --dir=./thankyou --site=${{ secrets.NETLIFY_THANKYOU_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-asanaguides:
    if: ${{ inputs.target == 'all' || inputs.target == 'asanaguides' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g netlify-cli
      - run: netlify deploy --prod --dir=./asanaguides --site=${{ secrets.NETLIFY_ASANAGUIDES_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
