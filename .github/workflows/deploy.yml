name: Deploy to Netlify

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - all
          - landing
          - checkout
          - course
          - thankyou

jobs:
  deploy-landing:
    if: ${{ inputs.target == 'all' || inputs.target == 'landing' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './landing'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_LANDING_SITE_ID }}

  deploy-checkout:
    if: ${{ inputs.target == 'all' || inputs.target == 'checkout' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './checkout'
          production-deploy: true
          functions-dir: './checkout/netlify/functions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_CHECKOUT_SITE_ID }}

  deploy-course:
    if: ${{ inputs.target == 'all' || inputs.target == 'course' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './course'
          production-deploy: true
          functions-dir: './course/netlify/functions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_COURSE_SITE_ID }}

  deploy-thankyou:
    if: ${{ inputs.target == 'all' || inputs.target == 'thankyou' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './thankyou'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_THANKYOU_SITE_ID }}
