ות דרך האף — הבטן נכנסת פנימה בנשיפה","השאיפה מגיעה לבד, פסיבית — הבטן משתחררת","התחל בקצב איטי — נשיפה בכל שנייה בערך","עשה 20–30 סבבים, ואז שאיפה עמוקה, עצירה קצרה, ונשיפה איטית","חזור על 2–3 סטים עם הפסקה ביניהם"],steps_en:["Sit comfortably, hands on knees, spine upright","Take a deep, relaxed inhale through the nose","Exhale sharply and briefly through the nose — belly draws inward on exhale","The inhale happens naturally, passively — the belly releases","Start at a slow pace — about one exhale per second","Do 20–30 rounds, then a deep inhale, brief retention, and slow exhale","Repeat for 2–3 sets with pauses between them"],benefits_he:"מעורר ומחדש אנרגיה, מנקה את דרכי הנשימה, מחזק שרירי בטן, מעלו חום פנימי. מסייע בריכוז ובהירות מנטלית.",benefits_en:"Energizes and revitalizes, clears respiratory passages, strengthens abdominal muscles, builds internal heat. Aids concentration and mental clarity.",contra_he:"אין לתרגל בהיריון, לחץ דם גבוה, מחלות לב, אפילפסיה, בעיות בטן חריפות, או בזמן מחזור כבד. יש להפסיק מיד אם מרגישים סחרחורת.",contra_en:"Do not practice during pregnancy, with high blood pressure, heart conditions, epilepsy, acute abdominal issues, or heavy menstruation. Stop immediately if dizzy.",when_he:"בתחילת השיעור, אחרי חימום ראשוני — ליצירת אנרגיה וחום. מצוין לפני תרגול ויניאסה דינמי.",when_en:"At the beginning of class after initial warm-up — to create energy and heat. Excellent before a dynamic vinyasa practice.",duration_he:"3–5 דקות (כולל הפסקות)",duration_en:"3–5 minutes (including pauses)"},{id:"nadi_shodhana",symbol:"◎",color:"#6040A0",sanskrit:"Nadi Shodhana",he_name:"נאדי שודהאנה · נשימת נחירים לסירוגין",en_name:"Nadi Shodhana · Alternate Nostril Breathing",steps_he:["שב בישיבה נוחה, יד שמאל על הברך","הבא את יד ימין לפנים — אגודל ליד נחיר ימין, קמיצה ליד נחיר שמאל","סגרי את נחיר ימין באגודל, שאף דרך נחיר שמאל (4 ספירות)","סגרי את שני הנחיריים, עצור בעדינות (4 ספירות)","שחרר את נחיר ימין, נשוף דרכו (4 ספירות)","שאף דרך נחיר ימין (4 ספירות)","סגרי, עצור (4 ספירות), שחרר שמאל, נשוף דרך שמאל (4 ספירות)","זהו סבב אחד שלם. המשך 5–10 סבבים"],steps_en:["Sit comfortably, left hand on your knee","Bring your right hand to your face — thumb beside right nostril, ring finger beside left","Close the right nostril with thumb, inhale through left (4 counts)","Close both nostrils, gently retain (4 counts)","Release the right nostril, exhale through it (4 counts)","Inhale through the right nostril (4 counts)","Close, retain (4 counts), release left, exhale through left (4 counts)","This is one complete round. Continue for 5–10 rounds"],benefits_he:"מאזנת בין ההמיספרות של המוח, מרגיעה את מערכת העצבים, מפחיתה חרדה ולחץ, מקדמת בהירות מנטלית ושקט פנימי עמוק.",benefits_en:"Balances brain hemispheres, calms the nervous system, reduces anxiety and stress, promotes mental clarity and deep inner quiet.",contra_he:"אין לעצור את הנשימה אם יש לחץ דם גבוה — ניתן לתרגל בלי עצירה. בזמן הצטננות חמורה, עדיף להמתין עד שהנחיריים פתוחים.",contra_en:"Do not retain breath with high blood pressure — practice without retention. During severe cold or congestion, wait until nostrils are clear.",when_he:"מושלמת לפתיחת שיעור כשהכוונה היא איזון ורוגע, או לסיום לפני שוואסאנה. נפלאה גם בשיעורי ערב.",when_en:"Perfect for opening a class focused on balance and calm, or before Savasana. Also wonderful for evening classes.",duration_he:"5–10 דקות",duration_en:"5–10 minutes"},{id:"bhramari",symbol:"◈",color:"#4080C0",sanskrit:"Bhramari",he_name:"בהרמרי · נשימת הדבורה",en_name:"Bhramari · Bee Breath",steps_he:["שב בישיבה נוחה, עצום עיניים בעדינות","הנח את האגודלות על תנוכי האוזניים (שנקי), שאר האצבעות על הפנים","שאף שאיפה עמוקה ומלאה דרך האף","בנשיפה, צור צליל זמזום רך — כמו דבורה עדינה","הרגש את התהודה בפנים, במצח, בחזה","המשך 7–10 סבבים","בסיום, שחרר את הידיים ושב בשקט כמה רגעים"],steps_en:["Sit comfortably, gently close your eyes","Place your thumbs on the ear flaps (tragus), remaining fingers across your face","Take a deep, full inhale through the nose","On exhale, create a soft humming sound — like a gentle bee","Feel the vibration resonate in your face, forehead, and chest","Continue for 7–10 rounds","When finished, release your hands and sit quietly for a few moments"],benefits_he:"מרגיעה עמוקה למערכת העצבים, מפחיתה מתח וכעס, מסייעת בשינה, מורידה לחץ דם. התהודה מרגיעה את המוח ומשרה שלווה.",benefits_en:"Deeply calms the nervous system, reduces tension and anger, aids sleep, lowers blood pressure. The vibration soothes the brain and induces peace.",contra_he:"אין לתרגל בשכיבה. יש להיזהר עם דלקת אוזניים. בהיריון — ניתן לתרגל בעדינות ובלי לחץ על האוזניים.",contra_en:"Do not practice lying down. Be careful with ear infections. During pregnancy — practice gently without pressing on the ears.",when_he:"מושלמת לסיום שיעור, לפני מדיטציה או שוואסאנה. מסייעת במיוחד בשיעורי ערב ושיעורים לניהול מתח.",when_en:"Perfect for class ending, before meditation or Savasana. Especially helpful in evening classes and stress-management sessions.",duration_he:"5–7 דקות",duration_en:"5–7 minutes"},{id:"sitali",symbol:"✦",color:"#5B9BD5",sanskrit:"Sitali",he_name:"סיטאלי · נשימה מקררת",en_name:"Sitali · Cooling Breath",steps_he:["שב בישיבה נוחה, עמוד שדרה ארוך","גלגל את הלשון לצורת שפופרת (אם זה לא מצליח — השתמש בסיטכארי: שפתיים מעט פתוחות, לשון מאחורי שיניים)","שאף דרך הלשון המגולגלת — הרגש אוויר קריר","סגרי את הפה, נשוף לאט דרך האף","המשך 10–15 סבבים","שים לב לתחושת הקרירות הנעימה שמתפשטת בגוף"],steps_en:["Sit comfortably with a tall spine","Curl the tongue into a tube shape (if unable — use Sitkari: lips slightly parted, tongue behind teeth)","Inhale through the curled tongue — feel the cool air","Close the mouth, exhale slowly through the nose","Continue for 10–15 rounds","Notice the pleasant cooling sensation spreading through the body"],benefits_he:"מקררת את הגוף, מורידה חום פנימי, מרגיעה את מערכת העיכול, מפחיתה כעס ותסכול, משיבה שלווה ואיזון.",benefits_en:"Cools the body, reduces internal heat, soothes the digestive system, reduces anger and frustration, restores calm and balance.",contra_he:"אין לתרגל בקור חיצוני עז, עם הצטננות או גודש באף, או עם לחץ דם נמוך מאוד. אסתמטיקים — בזהירות.",contra_en:"Do not practice in extreme cold, with a cold or nasal congestion, or with very low blood pressure. Asthmatics — use caution.",when_he:"מצוינת בשיעורי קיץ, אחרי תרגול דינמי עם חום, או כשהאנרגיה בכיתה חמה ועצבנית. נפלאה בין סטים אינטנסיביים.",when_en:"Excellent in summer classes, after a heated dynamic practice, or when class energy is hot and agitated. Wonderful between intense sets.",duration_he:"3–5 דקות",duration_en:"3–5 minutes"},{id:"sama_vritti",symbol:"□",color:"#5B7D6E",sanskrit:"Sama Vritti",he_name:"סאמה וריטי · נשימה מרובעת",en_name:"Sama Vritti · Box / Equal Breathing",steps_he:["שב בישיבה נוחה או שכב בשכיבת גב","שאף דרך האף לספירה של 4","עצור את הנשימה בעדינות לספירה של 4","נשוף דרך האף לספירה של 4","עצור בריאות ריקות לספירה של 4","זהו סבב אחד. התחל מ-4 ספירות — עם הזמן ניתן להעלות ל-6 או 8","המשך 8–12 סבבים"],steps_en:["Sit comfortably or lie on your back","Inhale through the nose for a count of 4","Hold the breath gently for a count of 4","Exhale through the nose for a count of 4","Hold on empty lungs for a count of 4","This is one round. Start with 4 counts — over time increase to 6 or 8","Continue for 8–12 rounds"],benefits_he:"מרגיעה את מערכת העצבים, מפחיתה חרדה, מאזנת בין הסימפטטית לפאראסימפטטית, משפרת ריכוז וקשב. פשוטה ונגישה לכולם.",benefits_en:"Calms the nervous system, reduces anxiety, balances sympathetic and parasympathetic systems, improves focus and attention. Simple and accessible to everyone.",contra_he:"אין לעצור נשימה עם לחץ דם גבוה — ניתן לתרגל בלי שלב העצירה. בהיריון — נשימה ללא עצירות.",contra_en:"Do not retain breath with high blood pressure — practice without the retention phases. During pregnancy — breathe without retentions.",when_he:"מתאימה לכל שלב בשיעור — פתיחה, מעברים, או סגירה. מצוינת במיוחד לרגעי חרדה או מתח בכיתה.",when_en:"Suitable for any stage of class — opening, transitions, or closing. Especially excellent during moments of anxiety or tension.",duration_he:"3–10 דקות",duration_en:"3–10 minutes"},{id:"viloma",symbol:"≋",color:"#8B6914",sanskrit:"Viloma",he_name:"וילומה · נשימה מופסקת",en_name:"Viloma · Interrupted Breathing",steps_he:["שב בישיבה נוחה או שכב על הגב","וילומה A — שאיפה מופסקת: שאף שליש, עצור 2 שניות, שאף עוד שליש, עצרי, השלימי את השאיפה","נשוף ארוכה וזורמת דרך האף","וילומה B — נשיפה מופסקת: שאף שאיפה מלאה","נשוף שליש, עצור 2 שניות, עוד שליש, עצרי, השלימי את הנשיפה","ניתן לשלב A+B יחד — גם שאיפה וגם נשיפה מופסקות","התחל עם 5 סבבים של כל גרסה"],steps_en:["Sit comfortably or lie on your back","Viloma A — interrupted inhale: inhale one-third, pause 2 seconds, inhale another third, pause, complete the inhale","Exhale long and flowing through the nose","Viloma B — interrupted exhale: take a full inhale","Exhale one-third, pause 2 seconds, another third, pause, complete the exhale","You can combine A+B — both interrupted inhale and exhale","Start with 5 rounds of each variation"],benefits_he:"בונה קיבולת ריאות, מחזקת שליטה בנשימה, מפתחת מודעות עדינה לתהליך הנשימה, מכינה את הגוף לפרנאיאמה מתקדמת.",benefits_en:"Builds lung capacity, strengthens breath control, develops subtle awareness of the breathing process, prepares the body for advanced pranayama.",contra_he:"אין לתרגל עם חרדת נשימה חמורה. יש להפסיק אם מרגישים סחרחורת. בהיריון — בלי עצירות ארוכות.",contra_en:"Do not practice with severe breathing anxiety. Stop if feeling dizzy. During pregnancy — avoid long retentions.",when_he:"בשלב הפרנאיאמה של השיעור (בדרך כלל אחרי אסאנות ולפני מדיטציה). מצוינת כגשר בין תרגול גופני לתרגול פנימי.",when_en:"During the pranayama phase of class (usually after asanas and before meditation). Excellent as a bridge between physical practice and inner work.",duration_he:"5–8 דקות",duration_en:"5–8 minutes"}];

  { id:"shoulders", symbol:"◆", color:"#4A6FA5", he:"כתפיים ושרוול מסובב", en:"Shoulders & Rotator Cuff", location_he:"מפרק הכתף — המפרק הניד ביותר בגוף. שרוול מסובב = ארבעה שרירים קטנים שעוטפים את ראש הכתף ושומרים עליו במקום", location_en:"The shoulder joint — the most mobile joint in the body. Rotator cuff = four small muscles wrapping the shoulder head, keeping it stable", function_he:"מאפשרים טווח תנועה רחב — הרמה, סיבוב, משיכה, דחיפה. ביוגה — נושאים משקל (צ׳אטורנגה, פלאנק), נפתחים (כיפולים אחוריים), מסתובבים (ביינדים)", function_en:"Allow wide range of motion — lifting, rotating, pulling, pushing. In yoga — bear weight (Chaturanga, Plank), open (backbends), rotate (binds)", issues_he:"כתפיים עגולות מעבודה מול מחשב. שרוול מסובב רגיש לפציעה מעומס יתר או תנועה חוזרת (במיוחד צ׳אטורנגה לא נכונה). כאבי כתף שכיחים מאוד", issues_en:"Rounded shoulders from desk work. Rotator cuff vulnerable to overuse injury or repetitive motion (especially poor Chaturanga). Shoulder pain extremely common", protection_he:"הדרך עמוד שכמה למטה ואחורה לפני כל נשיאת משקל. הצע שינויים: ברכיים למטה בצ׳אטורנגה, חגורה בביינדים. לעולם לא לדחוף את הכתף מעבר לטווח הנוח", protection_en:"Cue shoulder blades down and back before any weight bearing. Offer modifications: knees down in Chaturanga, strap in binds. Never push shoulder past comfortable range", poses_he:"צ׳אטורנגה, אדהו מוקהה שוואנאסנה, גומוקהאסנה (ידיים), אורדהווה מוקהה שוואנאסנה", poses_en:"Chaturanga, Adho Mukha Svanasana, Gomukhasana (arms), Urdhva Mukha Svanasana" },
  { id:"spine", symbol:"🧬", color:"#5B7D6E", he:"עמוד השדרה", en:"The Spine", location_he:"מבסיס הגולגולת ועד העצה — 33 חוליות: צווארי (7), חזי (12), מותן (5), עצה, עצם הזנב", location_en:"From skull base to tailbone — 33 vertebrae: cervical (7), thoracic (12), lumbar (5), sacrum, coccyx", function_he:"ביוגה — עמוד השדרה נע בארבעה כיוונים: כפיפה (קדימה), הארכה (אחורה), כפיפה צדית (לצד), וסיבוב. שיעור מאוזן מכיל את כל הארבעה. עמוד השדרה הבריא הוא עמוד שדרה שנע", function_en:"In yoga — the spine moves in four directions: flexion (forward), extension (back), lateral flexion (side), and rotation. A balanced class includes all four. A healthy spine is a moving spine", issues_he:"דיסקים — בעיקר מותניים וצוואריים — רגישים ללחץ חוזר. כיפולים קדימה עם גב מעוגל לוחצים דיסקים. כיפולים אחוריים עמוקים מבלי הכנה עלולים ללחוץ חוליות", issues_en:"Discs — especially lumbar and cervical — are vulnerable to repetitive pressure. Forward folds with a rounded back compress discs. Deep backbends without preparation can compress vertebrae", protection_he:"הדרך תמיד אורך לפני כפיפה. חממי את עמוד השדרה הדרגתית — אל תקפצי לתנוחות עמוקות. שלב את כל ארבעת הכיוונים. הקשב לכאב — כאב חד הוא אור אדום", protection_en:"Always cue length before bending. Warm the spine gradually — don't jump to deep poses. Include all four movement directions. Listen to pain — sharp pain is a red light", poses_he:"כל התנוחות! כפיפה: אוטאנאסנה. הארכה: אורדהווה מוקהה. צדית: טריקונאסנה. סיבוב: מאריצ׳אסנה", poses_en:"Every pose! Flexion: Uttanasana. Extension: Urdhva Mukha. Lateral: Trikonasana. Rotation: Marichyasana" },
  { id:"core", symbol:"△", color:"#D0A020", he:"ליבה (Core)", en:"Core Muscles", location_he:"הליבה היא לא רק ״שישיה״ — היא מערכת שלמה: שריר הבטן הרוחבי (עמוק), ישר הבטן (שטחי), אלכסוניים, רצפת אגן, סרעפת, ושרירי גב תחתון", location_en:"The core is not just 'abs' — it's a complete system: transversus abdominis (deep), rectus abdominis (surface), obliques, pelvic floor, diaphragm, and lower back muscles", function_he:"מייצבת את עמוד השדרה, מעבירה כוח בין חלקים עליונים ותחתונים, מגנה על הגב. ביוגה — מקבילו לרעיון הבנדהות: מולו בנדהה (רצפת אגן) ואודיאנה בנדהה (בטן תחתונה) מפעילים את הליבה העמוקה", function_en:"Stabilizes the spine, transfers force between upper and lower body, protects the back. In yoga — parallels the bandha concept: Mula Bandha (pelvic floor) and Uddiyana Bandha (lower belly) engage the deep core", issues_he:"ליבה חלשה = גב תחתון חשוף ללחץ. הפעלת יתר של שרירים שטחיים (כיווץ בטן) בלי השרירים העמוקים = יציבות מדומה. אחרי לידה — דרוש שיקום מיוחד", issues_en:"Weak core = lower back exposed to stress. Over-activating surface muscles (crunching) without deep muscles = false stability. Post-partum — requires special rehabilitation", protection_he:"הדרך הפעלת ליבה עמוקה: ״משכי טבור פנימה ומעלו בעדינות״ (לא כיווץ!). הצע שינויים בתנוחות ליבה חזקות. אם תלמיד/ה אחרי לידה — שאל על דיאסטזיס", protection_en:"Cue deep core activation: 'gently draw navel in and up' (not crunching!). Offer modifications in strong core poses. If a student is postpartum — ask about diastasis recti", poses_he:"נאוואסנה, פלאנק, צ׳אטורנגה, אוטקאטאסנה, כל תנוחות האיזון", poses_en:"Navasana, Plank, Chaturanga, Utkatasana, all balance poses" },
  { id:"knees", symbol:"🦿", color:"#C04040", he:"ברכיים", en:"Knees", location_he:"מפרק ציר בין הירך לשוק. מכיל רצועות צולבות (ACL/PCL), מניסקוסים, וכר שומני. יכול לכפוף ולהתיישר — אבל לא לסתובב בעומס", location_en:"A hinge joint between thigh and shin. Contains cruciate ligaments (ACL/PCL), menisci, and fat pad. Can bend and extend — but not designed to rotate under load", function_he:"ביוגה — הברך מקבלת עומס בתנוחות עמידה, כריעה, וישיבה. היא לא מיועדת ליצור תנועה — אלא לעקוב אחרי כף הרגל והירך. רוב פציעות הברכיים ביוגה הן מסיבוב לא רצוי", function_en:"In yoga — the knee bears load in standing, kneeling, and seated poses. It's not meant to create movement — but to follow the foot and hip. Most yoga knee injuries come from unwanted rotation", issues_he:"פציעות ברכיים שכיחות ביוגה: מניסקוס (מלוטוס, ויראסנה), רצועות (ווירבהדראסנה עם ברך נכנסת), כאב ריצפת ברך (כריעה ללא ריפוד)", issues_en:"Common yoga knee injuries: meniscus (from Lotus, Virasana), ligaments (Warrior with knee caving in), kneecap pain (kneeling without padding)", protection_he:"כלל הזהב: הברך עוקבת אחרי האצבע השנייה של כף הרגל. לעולם לא לדחוף ברכיים לרצפה (בדהא קונאסנה!). הצע ריפוד לכריעה. אם כואב — זה אומר לעצור", protection_en:"Golden rule: the knee tracks over the second toe. Never push knees to the floor (Baddha Konasana!). Offer padding for kneeling. If it hurts — it means stop", poses_he:"ווירבהדראסנה א׳ וב׳, אוטקאטאסנה, בדהא קונאסנה, וורקשאסנה (כף רגל לא על הברך!)", poses_en:"Virabhadrasana I & II, Utkatasana, Baddha Konasana, Vrksasana (foot never on knee!)" },

  { chapter:2, verse:33, sanskrit:"vitarka-bādhane pratipakṣa-bhāvanam",

    en:"When disturbed by negative thoughts — cultivate the opposite.",
    theme_he:"פרטיפקשה", theme_en:"Pratipaksha Bhavanam",
    teaching_he:"הטכניקה הזו פשוטה ועוצמתית: כשעולה מחשבה של כעס — תרגל סבלנות. כשיש פחד — תרגל אומץ. כשיש קנאה — תרגל שמחה באחר. זה לא להדחיק רגשות, אלא לתת להם מרחב ובמקביל לטפח את מה שמאזן אותם. בשיעור, אפשר לבקש מהתלמידים לבחור מילה אחת שהם רוצים לטפח ולחזור אליה בכל תנוחה.",
    teaching_en:"This technique is simple yet powerful: when anger arises — practice patience. When there's fear — practice courage. When jealousy — practice joy for others. This isn't suppressing emotions, but giving them space while cultivating what balances them. In class, ask students to choose one quality they want to cultivate and return to it in every pose.",

    class_ideas_en:["Each student chooses one word for practice ('patience', 'courage', 'release')","Challenging poses with returning to the word on each inhale","Savasana with visualization of the chosen quality"],

  { chapter:2, verse:42, sanskrit:"santoṣād anuttamaḥ sukha-lābhaḥ",

    teaching_he:"סנטושה לא אומרת ״אל תשתפר״ — היא אומרת ״תפסיק לרגע לרדוף ותסתכל על מה שכבר יש לך.״ על המזרן, זה אומר לא להשוות את עצמך לתלמיד לידך, לא להתאמץ להגיע לתנוחה שהגוף לא מוכן אליה. האושר הכי גדול לא מגיע ממה שאנחנו משיגים, אלא מהיכולת לנוח במה שכבר קיים.",
    teaching_en:"Santosha doesn't mean 'don't improve' — it means 'stop chasing for a moment and look at what you already have.' On the mat, this means not comparing yourself to the student next to you, not straining toward a pose the body isn't ready for. The greatest happiness comes not from achievement, but from the ability to rest in what already is.",

    teaching_en:"This is perhaps the most relevant sutra for teaching asana. Patanjali didn't say the pose should be perfect, beautiful, or impressive — he said it should be steady (sthira) and comfortable (sukham). Any pose causing pain or excessive strain is not yoga by this definition. As a teacher, this is your compass: Is the student steady? Are they breathing comfortably?",

    teaching_he:"זו ההמשך הישיר של הסוטרה הקודמת. אחרי שמצאת את היציבות והנוחות, השלב הבא הוא לשחרר את המאמץ המיותר. לא להפסיק לעבוד — אלא לעשות בדיוק את מה שצריך, ולא יותר. כמורה, אפשר לבקש מהתלמידים: ״תבדוק איפה אתה מתאמץ בלי סיבה — הלסת? הכתפיים? המצח? שחרר את מה שלא חייב להיות מכווץ.״",

    teaching_en:"Two forces drive growth: abhyasa (practice) and vairagya (release). Practice without release becomes obsession. Release without practice becomes laziness. They must come together — like two wings of a bird. In class, work intensely through vinyasa then completely surrender in Savasana, showing how the two complement each other.",

                <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                  {CLASS_TEMPLATES.map(tpl => (

                      onMouseLeave={e => { e.currentTarget.style.background=C.paper; e.currentTarget.style.color=C.dark; e.currentTarget.style.borderColor=C.border; }}>
                      {isHe ? tpl.he.name : tpl.en.name}

                </div>
              </div>

              {/* SANKALPA */}
              <div style={{ background:`linear-gradient(135deg, #F4EFE6, #EFF5F0)`, borderRadius:"14px", overflow:"hidden", marginBottom:"14px", border:`1px solid ${C.border}` }}>

                  <span style={{ fontWeight:"700", fontSize:"14px", color:C.dark }}>{isHe ? "סנקלפה — כוונת השיעור" : "Sankalpa — Class Intention"}</span>
                </div>
                <div style={{ padding:"10px 18px" }}>
                  <textarea value={sequence.sankalpa.text}
                    onChange={e => setSequence(prev => ({...prev, sankalpa:{...prev.sankalpa, text:e.target.value}}))}

                    style={{ width:"100%", padding:"8px 12px", borderRadius:"8px", border:`1px solid ${C.border}`, fontFamily:F, fontSize:"12px", color:C.dark, minHeight:"40px", resize:"vertical", direction:isHe?"rtl":"ltr", lineHeight:1.6, background:"white" }}/>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"4px", marginTop:"8px" }}>

                        <button key={i} onClick={() => setSequence(prev => ({...prev, sankalpa:{...prev.sankalpa, text: isHe ? item.he : item.en}}))}

                { key:"sunSalutations", licn:"sun", he:"ברכות שמש", en:"Sun Salutations", type:"count" },
                { key:"flow", licn:"waves", he:"פלואו", en:"Flow", type:"poses" },
                { key:"seated", licn:"armchair", he:"תנוחות ישיבה", en:"Seated Poses", type:"poses" },

                <div key={sec.key}
                  onDragOver={e => { if (sec.type==="poses") { e.preventDefault(); setDragOver(sec.key); } }}

                    e.preventDefault();
                    if (dragPose && sec.type==="poses") {
                      setSequence(prev => ({...prev, [sec.key]: {...prev[sec.key], poses:[...(prev[sec.key].poses||[]), dragPose]}}));

                    <div style={{ padding:"12px 16px", textAlign:"center", color:C.dusty, fontSize:"12px" }}>

              <button onClick={() => {
                const w = window.open('','_blank');

                const allSecs = [
                  {icon:"🧘",label:isHe?"מדיטציה":"Meditation",content:`${sequence.meditation.duration} ${isHe?'דקות':'min'}`},
                  {icon:"☀️",label:isHe?"ברכות שמש":"Sun Salutations",content:`${sequence.sunSalutations.count} ${isHe?'סבבים':'rounds'}`},
                  ...["warmup","flow","seated","closing"].map(k => {
                    const labels = {warmup:{he:"חימום",en:"Warmup"},flow:{he:"פלואו",en:"Flow"},seated:{he:"תנוחות ישיבה",en:"Seated"},closing:{he:"רצף סיום",en:"Closing"}};
                    const icons = {warmup:"🔥",flow:"🌊",seated:"🪷",closing:"🌙"};
                    return {icon:icons[k],label:isHe?labels[k].he:labels[k].en,content:(sequence[k].poses||[]).map((p,i)=>`${i+1}. ${poseName(p)} (${p.sanskrit})`).join('<br>')||'—'};
                  })
                ].map(s => `<div style="margin-bottom:12px;padding:12px;border:1px solid #D8E0DA;border-radius:8px"><div style="font-weight:700;font-size:14px;margin-bottom:6px">${s.icon} ${s.label}</div><div style="font-size:12px;line-height:1.8">${s.content}</div></div>`).join('');
                w.document.write(`<html dir="${dir}"><head><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"><style>body{font-family:'Heebo',sans-serif;padding:30px;max-width:600px;margin:auto}@media print{body{padding:10px}}</style></head><body><h1 style="font-size:20px;color:#1F3D34">${isHe?'רצף שיעור':'Class Sequence'}</h1><p style="color:#7A8A80;font-size:11px;margin-bottom:16px">יוגה שושן · ${new Date().toLocaleDateString(isHe?'he':'en')}</p>${sankalpaPrint}${allSecs}</body></html>`);
                w.document.close();
                w.print();
              }} style={{ width:"100%", padding:"14px", background:C.dark, color:"white", border:"none", borderRadius:"10px", fontFamily:F, fontSize:"14px", fontWeight:"700", cursor:"pointer", marginBottom:"20px" }}>
                {isHe ? React.createElement("span",{},LI("printer",14)," ","הדפסת רצף השיעור") : React.createElement("span",{},LI("printer",14)," ","Print Class Sequence")}
              </button>
              <button onClick={() => {
                if (confirm(isHe ? "למחוק את כל הרצף?" : "Clear entire sequence?")) {
                  setSequence({
                    sankalpa: { text:"", category:"" },
                    meditation: { notes:"", duration:"5" },
                    warmup: { poses:[], notes:"" },
                    sunSalutations: { count:"4", notes:"" },
                    flow: { poses:[], notes:"" },
                    seated: { poses:[], notes:"" },
                    closing: { poses:[], notes:"" },
                  });
                }
              }} style={{ width:"100%", padding:"12px", background:"transparent", color:C.warn, border:`1.5px solid ${C.warn}40`, borderRadius:"10px", fontFamily:F, fontSize:"13px", fontWeight:"600", cursor:"pointer", marginBottom:"20px" }}>
                {isHe ? React.createElement("span",{},LI("trash-2",14)," ","נקה הכל והתחל מחדש") : React.createElement("span",{},LI("trash-2",14)," ","Clear All & Start Over")}
              </button>
            </div>
          </main>
        </div>

        <aside className="sidebar-overlay-mobile" style={{ width:"260px", background:C.sidebar, overflowY:"auto", flexShrink:0, position:"fixed", top:"58px", bottom:0, [isHe?"right":"left"]:0, zIndex:70, transform:sidebarOpen?"translateX(0)":isHe?"translateX(100%)":"translateX(-100%)", transition:"transform 0.25s ease", boxShadow:sidebarOpen?"0 0 30px rgba(0,0,0,0.15)":"none", borderLeft: isHe ? "none" : `1px solid ${C.border}`, borderRight: !isHe ? "none" : `1px solid ${C.border}` }}>
          <div style={{ padding:"10px 7px" }}>
            {/* Search */}
            <div style={{ position:"relative", marginBottom:"8px" }}>
              <span style={{ position:"absolute", top:"50%", transform:"translateY(-50%)", [isHe?"right":"left"]:"10px", fontSize:"13px", pointerEvents:"none" }}>🔍</span>

                onChange={e => setSearch(e.target.value)}

                style={{ width:"100%", padding:isHe?"7px 32px 7px 10px":"7px 10px 7px 32px", borderRadius:"8px", border:`1px solid ${C.border}`, background:C.paper, fontFamily:F, fontSize:"12px", color:C.dark, outline:"none", direction:isHe?"rtl":"ltr" }}

              {search && (
                <button onClick={() => setSearch("")} style={{ position:"absolute", top:"50%", transform:"translateY(-50%)", [isHe?"left":"right"]:"8px", background:"none", border:"none", cursor:"pointer", fontSize:"12px", color:C.muted, padding:"2px" }}>✕</button>
              )}
            </div>

            {/* Flat alphabetical list */}
            {(() => {
              const sorted = search.trim()
                ? allPoses.filter(p => {
                    const q = search.toLowerCase();
                    return p.he.name.includes(q) || p.en.name.toLowerCase().includes(q) || p.sanskrit.toLowerCase().includes(q);
                  })
                : allPoses;

              if (sorted.length === 0) return (
                <div style={{ padding:"16px", textAlign:"center", color:C.dusty, fontSize:"12px" }}>
                  {isHe ? "לא נמצאו תנוחות" : "No poses found"}

              );

              return sorted.map(pose => (
                <button key={pose.id} onClick={() => { setSelected(pose); setSearch(""); setTab("assist"); setSidebarOpen(false); }}

                  style={{ width:"100%", textAlign:isHe?"right":"left", padding:"10px 12px", marginBottom:"2px", borderRadius:"7px", minHeight:"44px", background:selected.id===pose.id?`${pose.groupColor}18`:"transparent", border:`1.5px solid ${selected.id===pose.id ? pose.groupColor+"90":"transparent"}`, cursor:"pointer", fontFamily:F, transition:"all 0.15s" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                    <div style={{ width:6, height:6, borderRadius:"50%", background:pose.groupColor, flexShrink:0 }}/>
                    <div style={{ fontSize:"12.5px", fontWeight:selected.id===pose.id?"700":"400", color:selected.id===pose.id ? C.plum : C.dark, lineHeight:1.3 }}>{poseName(pose)}</div>
                  </div>
                  <div style={{ fontSize:"10px", color:C.dusty, marginTop:"2px", [isHe?"paddingRight":"paddingLeft"]:"12px" }}>{pose.sanskrit}</div>
                </button>
              ));
            })()}
          </div>
        </aside>

        {/* MAIN */}
        <main style={{ flex:1, minWidth:0, overflowY:"auto", display:"flex", flexDirection:"column" }}>

          {/* Pose Header */}
          <div className="pose-header-area" style={{ background:C.paper, borderBottom:`1px solid ${C.border}`, padding:"16px 22px 0", position:"sticky", top:0, zIndex:10, boxShadow:"0 2px 14px rgba(0,0,0,0.05)" }}>
            <div key={`${selected.id}-${lang}`} className="fade">
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:"10px", marginBottom:"11px", flexWrap:"wrap" }}>
                <div>
                  <div style={{ fontSize:"8px", letterSpacing:"3px", color:selected.groupColor, textTransform:"uppercase", fontWeight:"700", marginBottom:"4px" }}>
                    {isHe ? selected.group_he : selected.group_en}

                  <h1 className="pose-title-mobile" style={{ fontFamily:F, fontSize:"clamp(16px,2vw,22px)", fontWeight:"900", color:C.dark, margin:"0 0 3px" }}>{poseName(selected)}</h1>
                  <div style={{ fontSize:"12px", color:C.muted, fontStyle:"italic" }}>
                    {selected.sanskrit} · {isHe ? selected.en.name : selected.he.name}

                    <div key={k} style={{ padding:"5px 12px", background:`${col}12`, border:`1px solid ${col}30`, borderRadius:"20px", textAlign:"center" }}>

                      <div style={{ fontSize:"11px", fontWeight:"700", color:col }}>{v}</div>
                    </div>

                <div style={{ display:"flex", gap:"6px", marginBottom:"10px", flexWrap:"wrap", alignItems:"center" }}>
                  <span style={{ fontSize:"10px", color:C.muted, marginRight:"4px" }}>{isHe?"צ׳אקרות:":"Chakras:"}</span>
                  {selected.chakras.map(ck => {
                    const ch = CHAKRAS[ck];
                    if (!ch) return null;
                    return (
                      <span key={ck} style={{ fontSize:"10px", padding:"3px 8px", borderRadius:"12px", background:`${ch.color}15`, border:`1px solid ${ch.color}30`, color:ch.color, fontWeight:"600", whiteSpace:"nowrap" }}>
                        {ch.symbol} {isHe ? ch.he.split("·")[1]?.trim() || ch.he : ch.en.split("·")[1]?.trim() || ch.en}
                      </span>
                    );
                  })}
                </div>
              )}

              {/* Prev/Next Navigation */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
                <button onClick={goPrev} disabled={currentIndex===0} className="tap-target"
                  style={{ background:"transparent", border:`1px solid ${currentIndex===0?C.border:C.plum}40`, color:currentIndex===0?C.dusty:C.plum, borderRadius:"6px", padding:"8px 14px", fontFamily:F, fontSize:"12px", cursor:currentIndex===0?"default":"pointer", opacity:currentIndex===0?0.4:1, minHeight:"44px", minWidth:"44px" }}>
                  {isHe?"הבא ←":"← Prev"}
                </button>

              <div style={{ textAlign:"center", padding:"40px 20px", color:C.muted }}>
                {LI("search", 24)}
                <div style={{ marginTop:"8px", fontSize:"14px" }}>{isHe ? "לא נמצאו תוצאות" : "No results found"}</div>
              </div>
            ) : Object.entries(grouped).map(([catKey, items]) => {
              const cat = DICT_CATEGORIES[catKey];
              return (
              <div key={catKey} style={{ marginBottom:"28px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"12px", paddingBottom:"8px", borderBottom:`2px solid ${cat.color}30` }}>
                  <div style={{ width:"28px", height:"28px", borderRadius:"8px", background:cat.color+"18", display:"flex", alignItems:"center", justifyContent:"center" }}>{LI(cat.icon, 14)}</div>
                  <h3 style={{ fontFamily:F, fontSize:"16px", fontWeight:"800", color:cat.color, margin:0 }}>{isHe?cat.he:cat.en}</h3>
                  <span style={{ fontSize:"11px", color:C.muted }}>({items.length})</span>
                </div>
                <div style={{ display:"grid", gap:"8px" }}>
                  {items.map((d, i) => (
                    <div key={i} style={{ background:C.paper, borderRadius:"10px", padding:"14px 16px", border:`1px solid ${C.border}`, display:"flex", alignItems:"flex-start", gap:"14px", transition:"box-shadow 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.boxShadow="0 2px 12px rgba(0,0,0,0.06)"}
                      onMouseLeave={e => e.currentTarget.style.boxShadow="none"}>
                      <div style={{ flexShrink:0, minWidth:"130px" }}>
                        <div style={{ fontFamily:"'Georgia', serif", fontSize:"16px", fontWeight:"700", color:cat.color, fontStyle:"italic" }}>{d.sanskrit}</div>
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:"14px", fontWeight:"600", color:C.dark, lineHeight:"1.5" }}>{isHe ? d.he : d.en}</div>
                        <div style={{ fontSize:"11px", color:C.muted, marginTop:"2px" }}>{isHe ? d.en : d.he}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );})}
          </div>
        </div>
        );
      })()}

      {/* ====== CMD+K SEARCH PALETTE ====== */}
      {cmdkOpen && (
        <div onClick={() => setCmdkOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(4px)", zIndex:200, display:"flex", alignItems:"flex-start", justifyContent:"center", paddingTop:"min(15vh, 120px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:C.paper, borderRadius:"16px", width:"min(560px, 92vw)", maxHeight:"70vh", display:"flex", flexDirection:"column", boxShadow:"0 20px 60px rgba(0,0,0,0.25)", border:`1px solid ${C.border}`, overflow:"hidden", direction:dir }}>
            {/* Search input */}
            <div style={{ display:"flex", alignItems:"center", gap:"10px", padding:"16px 18px", borderBottom:`1px solid ${C.border}` }}>
              {LI("search", 20)}
              <input ref={cmdkRef} value={cmdkQuery} onChange={e => setCmdkQuery(e.target.value)}
                placeholder={isHe ? "חיפוש בכל התוכן — תנוחות, צ׳אקרות, פרנאיאמה, אנטומיה..." : "Search all content — poses, chakras, pranayama, anatomy..."}
                style={{ flex:1, border:"none", outline:"none", background:"transparent", fontFamily:F, fontSize:"16px", color:C.dark, direction:isHe?"rtl":"ltr" }} />
              <kbd onClick={() => setCmdkOpen(false)} style={{ fontSize:"11px", padding:"3px 8px", borderRadius:"5px", background:`${C.dark}10`, color:C.muted, border:`1px solid ${C.border}`, cursor:"pointer", fontFamily:"inherit" }}>ESC</kbd>
            </div>

            {/* Results */}
            <div style={{ overflowY:"auto", maxHeight:"calc(70vh - 64px)" }}>
              {cmdkQuery.length < 2 ? (
                <div style={{ padding:"30px 20px", textAlign:"center", color:C.muted, fontSize:"14px" }}>
                  {LI("sparkles", 24)}
                  <div style={{ marginTop:"8px" }}>{isHe ? "הקלידי לפחות 2 תווים לחיפוש" : "Type at least 2 characters to search"}</div>
                  <div style={{ fontSize:"11px", marginTop:"12px", color:C.dusty, lineHeight:"2" }}>
                    {isHe ? "תנוחות · צ׳אקרות · פרנאיאמה · אנטומיה · אתיקה · סוטרות · פציעות · סנקלפות" : "Poses · Chakras · Pranayama · Anatomy · Ethics · Sutras · Injuries · Sankalpas"}
                  </div>
                </div>
              ) : cmdkResults.length === 0 ? (
                <div style={{ padding:"30px 20px", textAlign:"center", color:C.muted, fontSize:"14px" }}>
                  {isHe ? "לא נמצאו תוצאות" : "No results found"}
                </div>
              ) : (() => {
                // Group results by category
                const groups = {};
                cmdkResults.forEach(r => { if (!groups[r.cat]) groups[r.cat] = []; groups[r.cat].push(r); });
                return Object.entries(groups).map(([cat, items]) => (
                  <div key={cat}>
                    <div style={{ padding:"8px 18px 4px", fontSize:"11px", fontWeight:"700", color:C.muted, textTransform:"uppercase", letterSpacing:"0.5px", background:`${C.dark}04` }}>{cat}</div>
                    {items.map((r, i) => (
                      <button key={i} onClick={r.action}
                        style={{ width:"100%", display:"flex", alignItems:"center", gap:"12px", padding:"10px 18px", border:"none", background:"transparent", cursor:"pointer", fontFamily:F, textAlign:isHe?"right":"left", transition:"background 0.1s" }}
                        onMouseEnter={e => e.currentTarget.style.background=`${C.dark}08`}
                        onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                        <div style={{ width:"32px", height:"32px", borderRadius:"8px", background:r.color ? r.color+"18" : `${C.dark}08`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                          {LI(r.icon, 16)}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:"14px", fontWeight:"600", color:C.dark, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.title}</div>
                          {r.sub && <div style={{ fontSize:"11px", color:C.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", marginTop:"1px" }}>{r.sub}</div>}
                        </div>
                        <div style={{ flexShrink:0, color:C.muted }}>{LI("arrow-left", 14)}</div>
                      </button>
                    ))}
                  </div>
                ));
              })()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const domNode = document.getElementById('root');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(YogaShoshan));
</script>
</body>
</html>
