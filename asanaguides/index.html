                      <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                        <input value={sequence[sec.key].count} onChange={e => setSequence(prev => ({...prev,[sec.key]:{...prev[sec.key],count:e.target.value}}))}
                          style={{ width:"40px", padding:"4px 8px", borderRadius:"6px", border:`1px solid ${C.border}`, fontFamily:F, fontSize:"12px", textAlign:"center" }}/>
                        <span style={{ fontSize:"11px", color:C.muted }}>{isHe?"סבבים":"rounds"}</span>
                      </div>
                    )}
                    {sec.type === "poses" && (
                      <button onClick={() => setSeqAddingTo(seqAddingTo===sec.key ? null : sec.key)}
                        style={{ background:seqAddingTo===sec.key?C.dark:"transparent", color:seqAddingTo===sec.key?"#FFF":C.dark, border:`1px solid ${C.dark}40`, borderRadius:"6px", padding:"4px 10px", fontFamily:F, fontSize:"11px", cursor:"pointer", fontWeight:"600" }}>
                        {seqAddingTo===sec.key ? (isHe?"סגור":"Close") : (isHe?"+ הוסיפי":"+ Add")}
                      </button>
                    )}
                  </div>

                  {/* Pose list */}
                  {sec.type === "poses" && sequence[sec.key].poses && sequence[sec.key].poses.length > 0 && (
                    <div style={{ padding:"8px 18px", display:"flex", flexWrap:"wrap", gap:"6px" }}>
                      {sequence[sec.key].poses.map((p, i) => (
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:"4px", background:C.paper, border:`1px solid ${C.border}`, borderRadius:"8px", padding:"4px 10px", fontSize:"12px", color:C.dark }}>
                          <span style={{ fontWeight:"600" }}>{i+1}.</span>
                          <span>{poseName(p)}</span>
                          <button onClick={() => removePose(sec.key, i)} style={{ background:"none", border:"none", color:C.warn, cursor:"pointer", fontSize:"14px", padding:"0 2px", lineHeight:1 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Add pose search */}
                  {seqAddingTo === sec.key && (
                    <div style={{ padding:"8px 18px 12px", borderTop:`1px solid ${C.border}` }}>
                      <input value={seqSearch} onChange={e => setSeqSearch(e.target.value)} autoFocus
                        placeholder={isHe?"חפשי תנוחה...":"Search pose..."}
                        style={{ width:"100%", padding:"8px 12px", borderRadius:"8px", border:`1px solid ${C.border}`, fontFamily:F, fontSize:"12px", marginBottom:"6px", direction:isHe?"rtl":"ltr" }}/>
                      <div style={{ maxHeight:"180px", overflowY:"auto" }}>
                        {allPoses.filter(p => {
                          if (!seqSearch.trim()) return true;
                          const q = seqSearch.toLowerCase();
                          return p.he.name.includes(q) || p.en.name.toLowerCase().includes(q) || p.sanskrit.toLowerCase().includes(q);
                        }).map(p => (
                          <button key={p.id} onClick={() => addPose(sec.key, p)}
                            style={{ width:"100%", textAlign:isHe?"right":"left", padding:"6px 10px", border:"none", background:"transparent", cursor:"pointer", fontFamily:F, fontSize:"12px", borderRadius:"4px" }}
                            onMouseEnter={e => e.currentTarget.style.background=`${C.dark}08`}
                            onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                            <span style={{ fontWeight:"600", color:C.dark }}>{poseName(p)}</span>
                            <span style={{ color:C.muted, marginRight:isHe?"8px":"0", marginLeft:isHe?"0":"8px", fontSize:"10px" }}>{p.sanskrit}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Notes */}
                  <div style={{ padding:"6px 18px 10px" }}>
                    <input value={sequence[sec.key].notes} onChange={e => setSequence(prev => ({...prev,[sec.key]:{...prev[sec.key],notes:e.target.value}}))}
                      placeholder={isHe?"הערות...":"Notes..."}
                      style={{ width:"100%", padding:"6px 10px", borderRadius:"6px", border:`1px solid ${C.border}`, fontFamily:F, fontSize:"11px", color:C.muted, background:"transparent", direction:isHe?"rtl":"ltr" }}/>
                  </div>
                </div>
              ))}
            </div>

            {/* Print button */}
            <button onClick={() => {
              const w = window.open('','_blank');
              const sankalpaPrint = sequence.sankalpa.text ? `<div style="margin-bottom:16px;padding:16px;border-radius:8px;background:linear-gradient(135deg,#F4EFE6,#EFF5F0);border:1px solid #D8E0DA"><div style="font-weight:700;font-size:15px;margin-bottom:8px">🕉 ${isHe?'סנקלפה':'Sankalpa'}</div><div style="font-size:14px;line-height:1.8;font-style:italic;color:#1F3D34">"${sequence.sankalpa.text}"</div></div>` : '';
              const secs = sections.map(s => {
                let content = '';
                if (s.type === 'duration') content = `${sequence[s.key].duration} ${isHe?'דקות':'min'}`;
                if (s.type === 'count') content = `${sequence[s.key].count} ${isHe?'סבבים':'rounds'}`;
                if (s.type === 'poses') content = (sequence[s.key].poses||[]).map((p,i) => `${i+1}. ${poseName(p)} (${p.sanskrit})`).join('<br>');
                const notes = sequence[s.key].notes ? `<div style="color:#7A8A80;font-size:12px;margin-top:4px">${sequence[s.key].notes}</div>` : '';
                return `<div style="margin-bottom:16px;padding:12px;border:1px solid #D8E0DA;border-radius:8px"><div style="font-weight:700;font-size:15px;margin-bottom:6px">${s.icon} ${isHe?s.he:s.en}</div><div style="font-size:13px">${content||'—'}</div>${notes}</div>`;
              }).join('');
              w.document.write(`<html dir="${dir}"><head><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"><style>body{font-family:'Heebo',sans-serif;padding:30px;max-width:600px;margin:auto}</style></head><body><h1 style="font-size:22px;color:#1F3D34">${isHe?'רצף שיעור':'Class Sequence'}</h1><p style="color:#7A8A80;font-size:12px;margin-bottom:20px">יוגה שושן · ${new Date().toLocaleDateString(isHe?'he':'en')}</p>${sankalpaPrint}${secs}</body></html>`);
              w.document.close();
              w.print();
            }} style={{ width:"100%", padding:"11px", marginTop:"16px", background:C.dark, color:"white", border:"none", borderRadius:"9px", fontFamily:F, fontSize:"13px", fontWeight:"700", cursor:"pointer" }}>
              {isHe ? "🖨️ הדפסת רצף" : "🖨️ Print Sequence"}
            </button>

            <button onClick={() => setShowSequencer(false)} style={{ width:"100%", padding:"11px", marginTop:"8px", background:"transparent", color:C.muted, border:`1px solid ${C.border}`, borderRadius:"9px", fontFamily:F, fontSize:"13px", fontWeight:"600", cursor:"pointer" }}>{ui.close}</button>
          </div>
        </div>
        );
      })()}

      {/* CHAKRA GUIDE MODAL */}
      {showChakras && (
        <div onClick={() => setShowChakras(false)} style={{ position:"fixed", inset:0, background:"rgba(15,22,15,0.88)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", backdropFilter:"blur(6px)" }}>
          <div onClick={e => e.stopPropagation()} style={{ background:C.paper, borderRadius:"18px", padding:"26px 30px", maxWidth:"750px", width:"100%", maxHeight:"88vh", overflowY:"auto", boxShadow:"0 28px 80px rgba(0,0,0,0.6)", direction:dir }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"16px" }}>
              <div>
                <h2 style={{ fontFamily:F, fontSize:"22px", fontWeight:"900", color:C.dark, margin:0 }}>{isHe ? "מדריך הצ׳אקרות" : "Chakra Guide"}</h2>
                <div style={{ fontSize:"12px", color:C.muted, fontStyle:"italic", marginTop:"4px" }}>{isHe ? "שבעת מרכזי האנרגיה בגוף" : "The seven energy centers of the body"}</div>
              </div>
              <button onClick={() => setShowChakras(false)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:"8px", width:32, height:32, cursor:"pointer", color:C.muted, fontSize:"16px", display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
              {CHAKRA_ORDER.map((key, i) => {
                const ch = CHAKRAS[key];
                return (
                  <div key={key} style={{ background:`${ch.color}08`, border:`1px solid ${ch.color}20`, borderRadius:"14px", overflow:"hidden" }}>
                    <div style={{ background:`${ch.color}15`, padding:"14px 18px", display:"flex", alignItems:"center", gap:"12px" }}>
                      <span style={{ fontSize:"24px" }}>{ch.symbol}</span>
                      <div>
                        <div style={{ fontWeight:"900", fontSize:"16px", color:ch.color }}>{isHe ? ch.he : ch.en}</div>
                        <div style={{ fontSize:"11px", color:C.muted }}>{isHe ? ch.en : ch.he} · {isHe ? ch.element_he : ch.element_en} · {isHe ? ch.location_he : ch.location_en}</div>
                      </div>
                    </div>
                    <div style={{ padding:"14px 18px", display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:"10px" }}>
                      <div>
                        <div style={{ fontSize:"10px", fontWeight:"700", color:ch.color, textTransform:"uppercase", letterSpacing:"1px", marginBottom:"4px" }}>{isHe ? "משמעות" : "Meaning"}</div>
                        <p style={{ margin:0, fontSize:"12px", lineHeight:1.7, color:C.dark }}>{isHe ? ch.meaning_he : ch.meaning_en}</p>
                      </div>
                      <div>
                        <div style={{ fontSize:"10px", fontWeight:"700", color:ch.color, textTransform:"uppercase", letterSpacing:"1px", marginBottom:"4px" }}>{isHe ? "איברים קשורים" : "Related Organs"}</div>
                        <p style={{ margin:0, fontSize:"12px", lineHeight:1.7, color:C.dark }}>{isHe ? ch.organs_he : ch.organs_en}</p>
                      </div>
                      <div>
                        <div style={{ fontSize:"10px", fontWeight:"700", color:C.warn, textTransform:"uppercase", letterSpacing:"1px", marginBottom:"4px" }}>{isHe ? "כשחסומה" : "When Blocked"}</div>
                        <p style={{ margin:0, fontSize:"12px", lineHeight:1.7, color:"#6A4A4A" }}>{isHe ? ch.blocked_he : ch.blocked_en}</p>
                      </div>
                      <div>
                        <div style={{ fontSize:"10px", fontWeight:"700", color:C.accent, textTransform:"uppercase", letterSpacing:"1px", marginBottom:"4px" }}>{isHe ? "איך לאזן" : "How to Balance"}</div>
                        <p style={{ margin:0, fontSize:"12px", lineHeight:1.7, color:C.dark }}>{isHe ? ch.balance_he : ch.balance_en}</p>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={() => setShowChakras(false)} style={{ width:"100%", padding:"11px", marginTop:"16px", background:C.dark, color:"white", border:"none", borderRadius:"9px", fontFamily:F, fontSize:"13px", fontWeight:"700", cursor:"pointer" }}>{ui.close}</button>
          </div>
        </div>
      )}
    </div>
  );
}


const domNode = document.getElementById('root');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(YogaShoshan));
</script>
</body>
</html>
